<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pics Gallery — Agora Intelligence Lab — AgIL</title>
    <meta name="description"
        content="Agora Intelligence Lab (AgIL) is an independent, open AI research lab fostering academic freedom in machine learning, NLP, computer vision, and interdisciplinary AI research.">

    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/agil-modern.css">
</head>

<body>

    <!-- ===== NAVBAR ===== -->
    <!-- Note: Logo + text "Agora Intelligence Lab", Center menu, Responsive -->
    <nav class="agil-navbar" id="site-nav">
        <div class="agil-nav-inner">
            <a href="/" class="agil-nav-brand">
                <img src="/assets/images/carousel/slide_5.jpg" alt="Agora Intelligence Lab Logo"
                    class="agil-logo-img" style="border-radius: 50%;">
                <span class="agil-brand-text">Agora Intelligence Lab</span>
            </a>

            <button class="agil-hamburger" aria-label="Toggle menu" id="mobile-menu-btn">
                <span></span><span></span><span></span>
            </button>

            <div class="agil-nav-links" id="nav-links">
                <a href="/" class="">Home</a>
                <a href="/people.html"
                    class="">People</a>
                <a href="/publications.html"
                    class="">Publication</a>
                <a href="/datasets.html"
                    class="">Dataset</a>
                <a href="/pics.html"
                    class="active">Pics</a>
            </div>
        </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="agil-main-content">
        <div class="agil-section" style="max-width: 1100px; margin: 0 auto; padding: 4rem 1.5rem;">
    <h1 class="agil-section-title" style="margin-bottom: 3rem; color: var(--agil-primary);">Gallery</h1>

    <div class="agil-gallery-grid"
        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem;">
        <!-- Demo images (since we don't know exact assets, we use some existing slide images as placeholders) -->
        <div class="agil-gallery-item"
            style="cursor: pointer; overflow: hidden; border-radius: var(--agil-radius); box-shadow: var(--agil-shadow); aspect-ratio: 1; transition: transform 0.3s;"
            onmouseover="this.style.transform='scale(1.03)';" onmouseout="this.style.transform='scale(1)';">
            <img src="/assets/images/carousel/slide_3.jpg" alt="Lab Activity 1"
                style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="agil-gallery-item"
            style="cursor: pointer; overflow: hidden; border-radius: var(--agil-radius); box-shadow: var(--agil-shadow); aspect-ratio: 1; transition: transform 0.3s;"
            onmouseover="this.style.transform='scale(1.03)';" onmouseout="this.style.transform='scale(1)';">
            <img src="/assets/images/carousel/slide_4.jpg" alt="Lab Activity 2"
                style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="agil-gallery-item"
            style="cursor: pointer; overflow: hidden; border-radius: var(--agil-radius); box-shadow: var(--agil-shadow); aspect-ratio: 1; transition: transform 0.3s;"
            onmouseover="this.style.transform='scale(1.03)';" onmouseout="this.style.transform='scale(1)';">
            <img src="/assets/images/carousel/slide_5.jpg" alt="Lab Activity 3"
                style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="agil-gallery-item"
            style="cursor: pointer; overflow: hidden; border-radius: var(--agil-radius); box-shadow: var(--agil-shadow); aspect-ratio: 1; transition: transform 0.3s;"
            onmouseover="this.style.transform='scale(1.03)';" onmouseout="this.style.transform='scale(1)';">
            <img src="/assets/images/carousel/slide_6.jpg" alt="Lab Activity 4"
                style="width: 100%; height: 100%; object-fit: cover;">
        </div>
    </div>
</div>

<!-- Lightbox Modal -->
<div id="agil-lightbox"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 2rem;">
    <span id="agil-lightbox-close"
        style="position: absolute; top: 20px; right: 30px; color: white; font-size: 2.5rem; font-weight: bold; cursor: pointer;">&times;</span>
    <img id="agil-lightbox-img" src=""
        style="max-width: 100%; max-height: 90vh; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
</div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="agil-footer site-footer">
        <div class="agil-footer-container footer-container">
            <div class="agil-contact-info contact-info">
                <h3>Contact Us</h3>
                <p><strong>Agora Intelligence Lab — AgIL</strong></p>
                <p>Independent Open Research Lab</p>
                <p>Vietnam</p>
                <p>Email: <a href="mailto:agoraintell@gmail.com">agoraintell@gmail.com</a></p>
            </div>
            <div class="agil-footer-bottom footer-bottom">
                &copy; 2026 AgIL — Agora Intelligence Lab. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- JS -->
    <script src="/assets/js/nav.js"></script>
    
    
    <script src="/assets/js/gallery.js"></script>
    
    

</body>

</html>
