about: Quang-Anh N. D. is a Bachelor’s degree in Applied Information Technology at the International School, Vietnam National University, Hanoi. 
  He's served as an Research Intern at HDC-VNU in 2023 and as an AI Intern at BKAV AI Corp in 2024. 
  His research experience includes positions at the Intelligent Control \& Artificial Intelligence Laboratory in 2024, 
  and he is currently a researcher at the Computer Vision and Robotics, Cognitive Machine Intelligence of VNUIS, Cognitive Robotics Lab of University of Arkansas laboratories,
  Center for Environmental Intelligence at VinUniveristy and
  at London Digital Twin Research Centre of Middlesex University, UK.
  His research interests include multidisciplinary applications research on AI and DS.

